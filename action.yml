name: FIT Bootstrap
description: >
  Opinionated FIT environment bootstrap. Sets up Bun, installs cached CLI
  dependencies (just / apm / gh) into ~/.local/bin, restores the
  node_modules + generated workspace cache, optionally checks out the
  GitHub wiki, and runs ./scripts/bootstrap.sh. To push the wiki back, run
  forwardimpact/fit-wiki@v1 after the agent step.

inputs:
  token:
    description: >
      GitHub token with read access to the wiki. When provided, the wiki is
      checked out into ./wiki. Leave blank to skip wiki checkout entirely.
      Pushing the wiki back is the caller's responsibility — see
      forwardimpact/fit-wiki@v1.
    required: false
    default: ""
  app-slug:
    description: >
      GitHub App slug for git identity (e.g. kata-agent-team). When
      provided with app-id, sets git identity to the app bot account
      instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: >
      GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.11"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}
        no-cache: false

    - name: Configure git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        if [ -n "$APP_SLUG" ] && [ -n "$APP_ID" ]; then
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

    # Rebase onto origin/main BEFORE the workspace cache key is computed.
    # Without this, hashFiles() reads the originally-checked-out bun.lock
    # and proto tree, but scripts/bootstrap.sh later rebases the workspace
    # onto main — so a "cache hit" can map to a tree that no longer matches
    # the cached node_modules (e.g. a release commit that added a new
    # @forwardimpact/* workspace package, leaving bun install skipped and
    # codegen unable to resolve common.proto). Doing the rebase here keys
    # the cache off the state we'll actually run against.
    - name: Sync workspace to origin/main
      shell: bash
      run: |
        set -euo pipefail
        if [ -f .git/shallow ]; then
          git fetch --unshallow origin
        fi
        git fetch origin main
        current_branch=$(git branch --show-current)
        if [ "$current_branch" = "main" ]; then
          git merge --ff-only origin/main
        else
          git branch -f main origin/main
          if git rebase main 2>/dev/null; then
            echo "Rebased '$current_branch' onto main."
          else
            git rebase --abort
            echo "Branch '$current_branch' has conflicts with main; cache key reflects pre-rebase state."
          fi
        fi

    - name: Checkout wiki
      if: inputs.token != ''
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.repository }}.wiki
        path: wiki
        token: ${{ inputs.token }}

    # Ask the consumer's install-deps.sh which paths it manages, rather than
    # caching the whole install prefix. The script is the source of truth for
    # what it installs, so it is also the source of truth for what to cache.
    # Layout is static, so this prints the right paths even on a cold cache
    # before anything is installed.
    - name: Resolve deps cache paths
      id: deps-paths
      shell: bash
      run: |
        {
          echo "paths<<EOF"
          if grep -q -- '--paths' scripts/install-deps.sh; then
            bash scripts/install-deps.sh --paths
          else
            # Consumer's install-deps.sh predates the --paths contract: fall
            # back to caching the whole local install prefix (legacy behaviour).
            echo "$HOME/.local/bin"
            echo "$HOME/.local/lib"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Restore deps cache
      id: deps-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        # Cache only the paths scripts/install-deps.sh declares via --paths
        # (each tool's lib dir + bin symlink), not the whole install prefix.
        # This keeps unrelated tooling that shares the prefix (uv, Python,
        # other XDG state under ~/.local) out of the deps cache — that
        # clutter already ships in the runner image, so caching it only
        # wastes copy time. The cache key still invalidates whenever the
        # script changes.
        path: ${{ steps.deps-paths.outputs.paths }}
        key: deps-${{ runner.os }}-${{ hashFiles('scripts/install-deps.sh') }}

    - name: Install CLI dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: bash scripts/install-deps.sh

    - name: Add deps to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Restore workspace cache
      id: workspace-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          node_modules
          generated
          libraries/*/src/generated
        key: workspace-${{ runner.os }}-${{ hashFiles('bun.lock', '**/*.proto', 'libraries/libcodegen/src/**', 'libraries/libcodegen/templates/**', 'libraries/libcodegen/bin/**') }}
        # On a key miss (lockfile or codegen inputs changed), warm-start
        # from the most recent workspace cache. cache-hit stays 'false'
        # on a restore-keys fallback, so scripts/bootstrap.sh still runs
        # bun install to reconcile node_modules with the new lockfile.
        restore-keys: |
          workspace-${{ runner.os }}-

    - name: Bootstrap
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BOOTSTRAP_WORKSPACE_CACHE_HIT: ${{ steps.workspace-cache.outputs.cache-hit }}
      run: ./scripts/bootstrap.sh
